name: Keep Render Alive
on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟自动执行
  workflow_dispatch:        # 保留手动触发

jobs:
  ping-both:
    runs-on: ubuntu-latest
    steps:
      - name: Ping fullstack-chat-app
        run: |
          curl -I "https://fullstack-chat-app-kpg6.onrender.com/"
      - name: Ping vue-gtd0
        run: |
          curl -I "https://vue-gtd0.onrender.com"
